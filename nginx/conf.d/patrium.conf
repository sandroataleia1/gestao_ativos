# Substitua __DOMAIN__ pelo domínio real antes do primeiro deploy (ex.:
# `sed -i "s/__DOMAIN__/patrium.esis.com.br/g" nginx/conf.d/patrium.conf`)
# — ver docs/deployment.md. O certificado (dummy no bootstrap, depois o
# real do Let's Encrypt) sempre vive no mesmo caminho
# certbot/conf/live/__DOMAIN__/, então este arquivo não muda entre o
# bootstrap e a operação normal.

# Porta 80: só o desafio ACME do certbot (renovação/emissão) responde aqui;
# todo o resto é redirecionado pra HTTPS.
server {
  listen 80;
  listen [::]:80;
  server_name __DOMAIN__;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name __DOMAIN__;

  ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Renovação do certbot continua funcionando com o site já em HTTPS (ele
  # também escreve o desafio aqui, não só na porta 80).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Cache explícito pros assets versionados/imutáveis do Next (hash no nome
  # do arquivo) — reforça o que o próprio Next já manda em
  # `Cache-Control: public, max-age=31536000, immutable` (ver
  # node_modules/next/dist/docs/.../self-hosting.md, "Automatic Caching"),
  # sem duplicar os headers de segurança (CSP, HSTS etc.), que já vêm do
  # `next.config.ts` e passam direto pelo proxy.
  location ^~ /_next/static/ {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Sem buffer — necessário pro streaming/Suspense (ver X-Accel-Buffering
    # em next.config.ts; aqui é o lado do nginx do mesmo ajuste).
    proxy_buffering off;
    proxy_read_timeout 90s;
  }
}
