# Config principal do nginx (montada em /etc/nginx/nginx.conf, somente
# leitura — ver docker-compose.prod.yml). Os server blocks (domínio, TLS,
# proxy pro app) ficam em nginx/conf.d/patrium.conf, incluído automaticamente
# via `include /etc/nginx/conf.d/*.conf` abaixo.

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Esconde a versão do nginx nos headers de resposta e nas páginas de erro
  # padrão — reduz a informação disponível para reconhecimento automatizado.
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Compressão — reduz o payload de HTML/CSS/JS/JSON antes de sair pro
  # client. Não inclui tipos já comprimidos (imagens, fontes woff2) porque
  # gzip neles só desperdiça CPU sem ganho de tamanho.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

  # Planilha de importação (.xlsx) hoje limitada a 5MB em
  # lib/imports/process.ts (MAX_FILE_SIZE_BYTES) — 10MB dá margem sem abrir
  # demais a porta pra upload gigante.
  client_max_body_size 10m;

  include /etc/nginx/conf.d/*.conf;
}
