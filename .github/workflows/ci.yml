name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gestao_ativos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gestao_ativos_test?schema=public
      ALLOW_INTEGRATION_TEST_DATABASE: "true"
      BETTER_AUTH_SECRET: "ci-test-secret-not-used-in-production"
      BETTER_AUTH_URL: "http://localhost:3010"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Aplica migrations no banco de teste
        run: npx prisma migrate deploy

      # Não bloqueia o build ainda: há 25 erros de lint pré-existentes no
      # projeto (regra react-hooks/set-state-in-effect e
      # react-hooks/static-components, adicionadas por uma versão mais nova
      # do eslint-plugin-react-hooks e nunca antes aplicadas — não havia CI).
      # Fica visível no log de cada execução até virar um item de limpeza
      # dedicado; typecheck/test/build continuam bloqueantes.
      - run: npm run lint
        continue-on-error: true

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
